# predict opts
model_path: '/home/csz_changsha/PycharmProjects/github/zhuang5252/AirTrack_all/AirTrack_single_img/model_saved/official_resnet/OfficialResNet/ResNet18/2025_05_12_15_sitch_tiny_3_2/minimum_loss.pt'
seed: 128  # 固定随机数种子
