
# Inference opts
seed: 128  # 随机数种子
device: 'cuda:0'  # GPU设备
img_read_method: 'gray'  # 使用哪种方式读取图像，支持 gray、rgb、unchanged
use_frame_align: False  # 是否使用帧对齐
use_second_classify: True  # 是否使用二级分类器
second_classify_method: 'filter_pos'  # 二级分类器方法，支持 filter_conf（使用一二级conf相乘）、filter_pos（直接使用二级分类器判断正负样本）
conf_threshold: 0.1  # 一级检测器和二级分类器置信度相乘的阈值
align_predictor_yaml: ./air_track/aligner/config/predict.yaml  # 帧对齐预测配置文件
detect_predictor_yaml: ./air_track/detector/config/predict_FlySubjectAirToGround.yaml  # 检测器预测配置文件
classify_predictor_yaml: ./air_track/classifier/config/predict.yaml  # 分类器预测配置文件
# 可选传入各个模块模型路径
#align_model_path: ''  # 帧对齐模型路径
#detect_model_path: ''  # 检测器模型路径
#classify_model_path: ''  # 分类器模型路径

# 数据集路径及文件类型
dataset_params:
  data_dir: '/home/csz_changsha/data/FlySubjectAirToGround_merge/dataset_orig'
  img_folder: 'images'  # 完整路径为data_dir/part/Images
  label_folder: 'labels'  # 完整路径为data_dir/part/ImageSets
  label_file: 'ImageSets/groundtruth.csv'  # 完整路径为data_dir/part/ImageSets
  # 图像和标签类型
  img_format: '.jpg'
  gt_format: '.txt'

  stage_train: 'train'
  stage_valid: 'val'
  stage_test: 'test'
  classes: [
      'None',
      'object',
  ]
  # 目标类别数
  nb_classes: 2

  # 测试集划分
#  part_val: ['scne1_ch3', 'scne4_ch1', 'scne6_ch2', 'scne7_ch1',
#             'scne15_ch1', 'scne30_1_ch2', 'scne30_2_ch1', 'scne31_ch1']
#  part_test: ['scne1_ch1', 'scne1_ch2', 'scne1_ch3', 'scne4_ch2', 'scne6_ch3', 'scne7_ch2',
#              'scne15_ch1', 'scne30_1_ch4', 'scne30_2_ch2', 'scne31_ch1']
#  part_test: ['scne4_ch1', 'scne4_ch2', 'scne4_ch3', 'scne4_ch4']
  part_test: ['val']
  img_size: [640, 512]  # 输入图像尺寸(w, h)
  max_pixel: 255  # 图像最大像素数
